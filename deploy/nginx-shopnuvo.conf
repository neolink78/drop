# nginx vhost for the dropshipping store on the shopnuvo.fr domain.
#
# Install:
#   sudo cp deploy/nginx-shopnuvo.conf /etc/nginx/sites-available/shopnuvo
#   sudo ln -s /etc/nginx/sites-available/shopnuvo /etc/nginx/sites-enabled/shopnuvo
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d shopnuvo.fr -d www.shopnuvo.fr
#
# After HTTPS is issued, certbot rewrites this file to add the SSL config and
# an HTTP->HTTPS redirect automatically.

server {
    listen 80;
    server_name shopnuvo.fr www.shopnuvo.fr;

    # Backend API and Stripe webhook -> Express (port 4100)
    location /api/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webhook/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> Next.js frontend (port 3100)
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
