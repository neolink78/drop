# nginx vhost for the dropshipping store.
# Copy to /etc/nginx/sites-available/drop and symlink into sites-enabled,
# then run certbot to add HTTPS (it will rewrite this file with the SSL bits).
#
#   sudo cp deploy/nginx-drop.conf /etc/nginx/sites-available/drop
#   sudo ln -s /etc/nginx/sites-available/drop /etc/nginx/sites-enabled/drop
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d drop.thibautresse.ovh

server {
    listen 80;
    server_name drop.thibautresse.ovh;

    # Backend API and Stripe webhook -> Express (port 4100)
    location /api/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webhook/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> Next.js frontend (port 3100)
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
